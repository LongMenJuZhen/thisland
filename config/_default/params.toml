# Stack v4 site params.
# 完整 schema 文档: https://stack.jimmycai.com/guide/configuration

mainSections = ["posts"]

# Stack v4 期望 .Site.Params.dateFormat 是 {published = "...", lastUpdated = "..."}
# 不同语言可在 languages.<lang>.params.dateFormat 覆盖.
[dateFormat]
  published = "2006-01-02"
  lastUpdated = "2006-01-02"

[sidebar]
  emoji = "🍎"
  subtitle = "诸法无我,诸行无常,没有第三条"
  avatar = "img/avatar.jpg"
  compact = false

[article]
  # 文章页右侧 TOC 显隐 (theme-stack v4 的 single.html 用 article.toc 开关).
  toc = true

[list]
  showSummary = true
  groupByYear = true
  paginate = 10

[search]
  enabled = true

[code]
  copyButton = true

# 明 / 暗主题切换
[colorScheme]
  toggle = true
  default = "auto"

# giscus 评论
[comments]
  enabled = true
  provider = "giscus"

  [comments.giscus]
    repo = "LongMenJuZhen/thisland"
    repoID = "R_kgDOOqu3Ww"
    category = "Comment"
    categoryID = "DIC_kwDOOqu3W84C_6oF"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "top"
    lightTheme = "light"            # 关键：拆成两个
    darkTheme = "dark_dimmed"      # 关键：拆成两个
    lang = "zh-CN"
    loading = "lazy"             # 推荐加上

# 侧边 widget. 每项需 `type` 指向 layouts/_partials/widget/<type>.html
# 可用: categories, tag-cloud, toc, search, taxonomy
[[widgets.homepage]]
  type = "search"
  [widgets.homepage.params]
    title = "搜索"

[[widgets.homepage]]
  type = "categories"
  [widgets.homepage.params]
    title = "分类"

[[widgets.homepage]]
  type = "tag-cloud"
  [widgets.homepage.params]
    title = "标签"

# 文章页 (single.html) 走 widgets.page. 当前只配了 toc widget.
# widgets.homepage 给归档页 (/posts/) 用.
# 首页、taxonomy 列表 (/tags/...、/categories/...)、search 等其他页面都没有右侧栏
# (见 layouts/_default/{home,list,search}.html 各自的 right-sidebar define).
[[widgets.page]]
  type = "toc"

# 背景: 用静态图片.
[cover]
  image = "img/banner.jpeg"
  caption = ""
  alt = "Thisland"
  responsiveImages = true

# Hero banner — 在 post 详情页之外的页面顶部插入一张全宽图片.
# 由 layouts/_partials/hero.html 渲染, assets/scss/custom.scss 决定样式.
#
# 实际显示规则见 hero.html: 只在首页 (IsHome) 和搜索页 (Layout == "search") 渲染.
# 其他页面 (归档 /posts/、文章页 /posts/foo/、taxonomy 列表等) 一律不显示,
# 调用方 (layouts/_default/*.html) 仍然 partial 一下也无副作用, hero 内部会跳过.
#
# height:
#   -tall   66vh   (首页 hero,占上 2/3 视口)
#   -large  60vh   (其他页面行内 banner,首屏约 3/5)
#   -medium 45vh
#   -small  30vh
#
# Per-page override: front matter 可用 `hero: false` 关闭单个页面,
# 或 `hero: { image: "...", height: "medium" }` 覆盖.
[hero]
  enabled = true
  image = "img/banner.jpeg"
  # height 留空: 首页 IsHome=true 时 fallback 到 "tall" (2/3 视口),
  # 其他页面 fallback 到 "large" (行内 banner).
  # 可显式覆盖为 "medium" / "small" / 数字 (如 "50vh").

# Favicon — Stack 的 helper/image.html 只识别 page bundle 里的 .Resources,
# 静态文件它会尝试 resources.GetRemote 拉取.  走 static 目录里直接被浏览器请求最简单.
# 这里不设 params.favicon, 改在 layouts/_partials/head/extend.html 里手动注入.

[footer]
  showMenu = true
  showCopyright = true
  showSocial = true
  showAppearanceSwitcher = true
  showScrollToTop = true
